global:
  download_dir: ./downloads
  output_dir: ./output
  log_dir: ./logs
  state_db: ./data/state.db
  max_retry: 3
ai:
  provider: deepseek
  model: deepseek-v4-flash
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  reasoning: false
  json_response: true
  timeout: 120
  max_retries: 2
youtube:
  cookies: null
  cookies_from_browser: chrome
  extractor_args: []
translation:
  source_lang: en
  target_lang: zh-CN
  max_title_length: 70
  subtitle_batch_size: 50
  segmentation_batch_size: 300
  segmentation_concurrency: 2
  style_prompt: 适合B站的中文标题，简洁、自然、不夸张
  glossary:
    Brawl Stars: 荒野乱斗
    Hypercharge: 终极技能
subtitle_style:
  font_cn: Source Han Sans CN
  font_en: Inter
  fonts_dir: ./fonts
  cn_font_ratio: 0.05
  en_font_ratio: 0.028
  cn_margin_ratio: 0.095
  en_margin_ratio: 0.039
  cn_outline_ratio: 0.0038
  en_outline_ratio: 0.0028
bilibili:
  cookies: ./data/bilibili_cookies.json
  executable: biliup
  user_cookie_arg: -u
  default_tags:
  - 搬运
  - 翻译
  default_tid: 4
  title_prefix: ''
  extra_args: []
  upload:
    copyright: 2
    source: youtube
    line: AUTO
