global:
  download_dir: ./downloads
  output_dir: ./output
  log_dir: ./logs
  state_db: ./data/state.db
  max_retry: 3
ai:
  provider: deepseek
  model: deepseek-v4-flash
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  reasoning: false
  json_response: true
  timeout: 120
  max_retries: 2
youtube:
  cookies: /Users/wu/Github/y2b/data/youtube_cookies.txt
  cookies_from_browser: null
  extractor_args: []
translation:
  source_lang: en
  target_lang: zh-CN
  max_title_length: 70
  subtitle_batch_size: 50
  subtitle_concurrency: 4
  segmentation_batch_size: 300
  segmentation_concurrency: 4
  style_prompt: 适合B站的中文标题，简洁、自然、不夸张
  glossary:
    Brawl Stars: 荒野乱斗
    Hypercharge: 终极技能
    brawler: 英雄
    brawlers: 英雄
    nano drop: 纳米掉落
    nano drops: 纳米掉落
    nano power: 纳米能力
    nano powers: 纳米能力
subtitle_style:
  font_cn: Source Han Sans CN Medium
  font_en: Inter SemiBold
  fonts_dir: ./fonts
  cn_font_ratio: 0.052
  en_font_ratio: 0.03
  cn_margin_ratio: 0.075
  cn_single_line_margin_ratio: 0.068
  cn_single_line_wrapped_en_margin_ratio: 0.094
  en_margin_ratio: 0.033
  cn_outline_ratio: 0.0048
  en_outline_ratio: 0.0028
bilibili:
  cookies: ./data/bilibili_cookies.json
  executable: biliup
  user_cookie_arg: -u
  default_tags:
  - 翻译
  - YouTube
  default_tid: 4
  title_prefix: ''
  auto_metadata: true
  tag_min_count: 1
  tag_max_count: 4
  tid_whitelist:
    36: 知识
    4: 游戏
  extra_args: []
  upload:
    copyright: 1
    source: YouTube
    line: null
    no_reprint: 0
render:
  profile: quality
  quality:
    codec: libx264
    preset: medium
    crf: 20
  fast:
    codec: h264_videotoolbox
    bitrate: 6M
